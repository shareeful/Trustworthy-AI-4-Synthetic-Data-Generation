# Regulatory Profiles: EU AI Act Articles → Compliance Thresholds

profile_p1:
  name: "High-Risk Medical"
  description: "Prioritizes fairness for medical AI systems"
  eu_article: "Article 6 (Non-discrimination)"
  target_characteristic: "Fairness"
  priorities:
    fairness: 0.6
    security: 0.3
    explainability: 0.1
  thresholds:
    equalized_odds: 0.05
    demographic_parity: 0.05
    accuracy_floor: 0.60
  preprocessing:
    method: "inverse_probability_weighting"
    protected_attributes: ["gender"]

profile_p2:
  name: "Safety-Critical"
  description: "Prioritizes robustness against adversarial attacks"
  eu_article: "Article 15 (Robustness)"
  target_characteristic: "Security"
  priorities:
    fairness: 0.2
    security: 0.7
    explainability: 0.1
  thresholds:
    attack_success_rate: 0.15
    clean_accuracy: 0.60
    accuracy_floor: 0.60
  preprocessing:
    method: "standard"
    adversarial_training: true
    adversarial_ratio: 0.1
    epsilon: 0.1

profile_p3:
  name: "Audit-Ready"
  description: "Prioritizes explainability and transparency"
  eu_article: "Article 13 (Transparency)"
  target_characteristic: "Explainability"
  priorities:
    fairness: 0.2
    security: 0.1
    explainability: 0.7
  thresholds:
    shap_rank_stability: 0.9
    feature_sparsity: 0.1
    accuracy_floor: 0.60
  preprocessing:
    method: "feature_selection"
    importance_threshold: 0.01